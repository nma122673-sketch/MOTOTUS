            async function generateCodeWithAgents(optimizedPrompt, requirements, techStack, expectedOutput) {
                const agents = [];
                const agentMap = {
                    groq: { provider: 'groq', role: 'JavaScript logic + fast execution' },
                    gemini: { provider: 'gemini', role: 'general code generation' },
                    mistral: { provider: 'mistral', role: 'reasoning & debugging' },
                    cerebras: { provider: 'cerebras', role: 'planning + fast code' },
                    cloudflare: { provider: 'cloudflare', role: 'validation & security' }
                };
                for (const [key, val] of Object.entries(multiAgentSettings.agents)) {
                    if (val && (await checkHasKey(key))) {
                        agents.push({ provider: key, role: agentMap[key]?.role || 'code generation' });
                    }
                }
                if (agents.length === 0) throw new Error('No enabled agents with valid keys.');
                const baseInstruction =
                    `You are an expert developer. Generate production-ready code based on:
Requirements: ${JSON.stringify(requirements)}
Tech Stack: ${JSON.stringify(techStack)}
Expected Output: ${expectedOutput}
Optimized Prompt: ${optimizedPrompt}

Write clean, well-commented, complete code.`;
                const promises = agents.map(agent => {
                    const roleSpecific = `You are primarily responsible for: ${agent.role}.`;
                    const fullPrompt = `${roleSpecific}\n\n${baseInstruction}`;
                    const model = getDefaultModelForAPI(agent.provider);
                    return callAPI(agent.provider, model, fullPrompt)
                        .then(text => ({ provider: agent.provider, code: text, success: true }))
                        .catch(err => ({ provider: agent.provider, error: err.message, success: false }));
                });
                const results = await Promise.allSettled(promises);
                const successful = results.filter(r => r.status === 'fulfilled' && r.value.success).map(r => r.value);
                if (successful.length === 0) throw new Error('All agent code generation attempts failed.');
                return successful;
            }

            async function mergeAndJudge(agentOutputs, originalPrompt) {
                const combined = agentOutputs.map(out => `[${out.provider}]\n${out.code}`).join('\n\n---\n\n');
                const instruction =
                    `You are the final JUDGE and MERGER. Combine the best parts of each version into a single, complete solution.
Remove duplication, errors, inconsistencies. Ensure all requirements are met. Improve naming, structure, comments.
Output ONLY the final merged code (no explanations, no markdown wrappers, just raw code).

Original request: ${originalPrompt}

Agent outputs:
${combined}

Final merged code:`;
                const model = getDefaultModelForAPI('mistral');
                return await callAPI('mistral', model, instruction);
            }

            async function handleCodingRequest(userPrompt) {
                if (!multiAgentSettings.enabled) {
                    const result = await getResponseWithFallback(activeProvider, userPrompt);
                    return result.text;
                }
                const aiMsg = createAIMessage();
                const bubble = aiMsg.querySelector('.bubble');
                bubble.innerHTML = '<span style="color:var(--text-muted);">🧠 Optimizing your coding request...</span>';
                chatMessages.appendChild(aiMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                let optimized;
                try { optimized = await optimizePrompt(userPrompt); } catch (err) {
                    bubble.innerHTML = `<span style="color:#ff4a5a;">Optimization failed: ${err.message}</span>`;
                    throw err;
                }
                bubble.innerHTML = '<span style="color:var(--text-muted);">⚡ Generating code with multi‑agent system...</span>';
                let agentResults;
                try {
                    agentResults = await generateCodeWithAgents(optimized.optimizedPrompt, optimized.requirements,
                        optimized.techStack, optimized.expectedOutput);
                } catch (err) {
                    bubble.innerHTML = `<span style="color:#ff4a5a;">Code generation failed: ${err.message}</span>`;
                    throw err;
                }
                bubble.innerHTML = '<span style="color:var(--text-muted);">🔄 Merging and improving final code...</span>';
                let finalCode;
                try { finalCode = await mergeAndJudge(agentResults, userPrompt); } catch (err) {
                    finalCode = agentResults[0].code;
                    showToast('⚠️ Merge failed; using first agent\'s output.');
                }
                bubble.innerHTML = '';
                const queue = buildTypewriterQueue(finalCode);
                return new Promise((resolve) => {
                    startTypewriter(queue, bubble, aiMsg, () => { resolve(finalCode); });
                });
            }

            // ---------- SEND HANDLER ----------
            async function handleSend() {
                const inputText = userInput.value.trim();
                if (!inputText) return;
                const hasKey = await checkHasKey(activeProvider);
                if (!hasKey) {
                    showToast(`🔑 Configure API Key for ${providerNames[activeProvider]} in Admin Panel first!`);
                    return;
                }
                const userMsg = createMessage(inputText, 'user');
                chatMessages.appendChild(userMsg);
                userInput.value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;
                isTyping = true;
                stopRequested = false;
                userInput.disabled = true;
                setSendButtonState(true);

                if (isCodingMode && multiAgentSettings.enabled) {
                    try {
                        await handleCodingRequest(inputText);
                    } catch (err) { console.error(err); } finally {
                        isTyping = false;
                        userInput.disabled = false;
                        setSendButtonState(false);
                    }
                    return;
                }

                const aiMsg = createAIMessage();
                chatMessages.appendChild(aiMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                const bubble = aiMsg.querySelector('.bubble');
                let searchData = null;
                try {
                    if (internetSearchEnabled || needsInternetSearch(inputText)) {
                        bubble.innerHTML = '🔍 Searching the internet...';
                        searchData = await performSearch(inputText);
                    }
                } catch (err) { console.warn("Search failed:", err); }
                bubble.innerHTML = '<span class="cursor-blink"></span>';
                const controller = new AbortController();
                activeControllers.push(controller);
                let augmentedPrompt = inputText;
                let searchNotice = '';
                if (searchData) {
                    augmentedPrompt =
                        `Use the following context from the internet to answer accurately. Cite sources.\n\nContext:\n${searchData.results}\n\nUser Question:\n${inputText}`;
                    searchNotice =
                        `<div style="font-size:11px; color:var(--text-muted); margin-bottom:8px; border-bottom:1px dashed var(--border-color); padding-bottom:6px;"><i class="fa-solid fa-globe"></i> Search Results from <strong>${searchData.provider}</strong> integrated.</div>`;
                }
                try {
                    const result = await getResponseWithFallback(activeProvider, augmentedPrompt);
                    conversationHistory.push({ role: 'user', content: inputText });
                    conversationHistory.push({ role: 'assistant', content: result.text });
                    const finalCombined = searchNotice + result.text;
                    const queue = buildTypewriterQueue(finalCombined);
                    startTypewriter(queue, bubble, aiMsg, () => {
                        isTyping = false;
                        userInput.disabled = false;
                        setSendButtonState(false);
                        const idx = activeControllers.indexOf(controller);
                        if (idx !== -1) activeControllers.splice(idx, 1);
                    });
                } catch (err) {
                    aiMsg.classList.remove('typing');
                    if (err.name === 'AbortError') {
                        bubble.innerHTML = '<span style="color:var(--text-muted);">Aborted by user.</span>';
                    } else {
                        bubble.innerHTML = `<span style="color:#ff4a5a;">Error: ${err.message}</span>`;
                    }
                    isTyping = false;
                    userInput.disabled = false;
                    setSendButtonState(false);
                    const idx = activeControllers.indexOf(controller);
                    if (idx !== -1) activeControllers.splice(idx, 1);
                }
            }

            // ---------- EVENT BINDINGS ----------
            sendBtn.addEventListener('click', function() {
                if (isTyping) {
                    stopRequested = true;
                    abortAllActiveRequests();
                    if (typewriterTimeout) { clearTimeout(typewriterTimeout);
                        typewriterTimeout = null; }
                    isTyping = false;
                    userInput.disabled = false;
                    setSendButtonState(false);
                    showToast('⏹️ All streams aborted.');
                    document.querySelectorAll('.chat-message.typing').forEach(el => el.classList.remove('typing'));
                } else { handleSend(); }
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !isTyping) { e.preventDefault();
                    handleSend(); }
            });

            // ---------- CHIPS ----------
            const chips = document.querySelectorAll('.chip');
            chips.forEach((chip, index) => {
                chip.addEventListener('click', function() {
                    chips.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    const type = this.getAttribute('data-chip');
                    const value = savedPrompts[type] || defaultPrompts[type];
                    userInput.value = value;
                    userInput.focus();
                    this.style.transform = 'scale(0.92)';
                    setTimeout(() => { this.style.transform = ''; }, 200);
                    isCodingMode = (type === 'code');
                    if (isCodingMode) showToast('🧠 Multi‑Agent Coding System ENABLED');
                    else isCodingMode = false;
                });
            });

            // ---------- DROPDOWNS ----------
            const apiTrigger = document.getElementById('apiDropdownTrigger');
            const apiMenu = document.getElementById('apiDropdownMenu');
            const apiItems = apiMenu.querySelectorAll('.model-dropdown-item');
            apiTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                apiMenu.classList.toggle('open');
                this.classList.toggle('open');
            });
            apiItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const provider = this.getAttribute('data-provider');
                    activeProvider = provider;
                    db.ref('chatSettings/activeProvider').set(provider);
                    apiItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('apiSelectedLabel').textContent = this.querySelector('.item-label')
                        .textContent.trim();
                    apiMenu.classList.remove('open');
                    apiTrigger.classList.remove('open');
                    showToast(`🧠 Provider set to ${providerNames[provider]}`);
                });
            });

            const qualityTrigger = document.getElementById('dropdownTrigger');
            const qualityMenu = document.getElementById('dropdownMenu');
            const qualityItems = qualityMenu.querySelectorAll('.premium-dropdown-item');
            qualityTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                qualityMenu.classList.toggle('open');
                this.classList.toggle('open');
            });
            qualityItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    const value = this.getAttribute('data-value');
                    if (value === 'Complex') return;
                    e.stopPropagation();
                    document.getElementById('selectedLabel').textContent = this.querySelector('.item-label')
                        .textContent.trim();
                    qualityItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    qualityMenu.classList.remove('open');
                    qualityTrigger.classList.remove('open');
                    showToast('Performance Level: ' + value);
                });
            });

            document.addEventListener('click', function(e) {
                const apiDropdown = document.getElementById('apiDropdown');
                if (apiDropdown && !apiDropdown.contains(e.target)) { apiMenu.classList.remove('open');
                    apiTrigger.classList.remove('open'); }
                const premiumDropdown = document.getElementById('premiumDropdown');
                if (premiumDropdown && !premiumDropdown.contains(e.target)) { qualityMenu.classList.remove('open');
                    qualityTrigger.classList.remove('open'); }
            });

            // ---------- COMPLEX TOGGLE ----------
            document.getElementById('complexCheckbox').addEventListener('change', function(e) {
                e.stopPropagation();
                showToast(this.checked ? '🧠 Complex Reasoning Enabled' : '🧠 Standard Response Mode');
                this.closest('.premium-dropdown-item').classList.toggle('complex-active', this.checked);
            });

            // ---------- REFRESH ----------
            const resetAction = () => {
                chatMessages.innerHTML = '';
                userInput.value = '';
                conversationHistory = [];
                abortAllActiveRequests();
                stopRequested = false;
                isTyping = false;
                userInput.disabled = false;
                setSendButtonState(false);
                showToast('✨ Thread reset successfully.');
                isCodingMode = false;
                chips.forEach(c => c.classList.remove('active'));
            };
            document.getElementById('newChatBtn').addEventListener('click', resetAction);
            document.getElementById('sidebarNewChat').addEventListener('click', resetAction);

            // ---------- HELP ----------
            document.querySelector('.help-icon').addEventListener('click', () => {
                showToast('💡 Settings আইকন থেকে প্রম্পট কাস্টমাইজ করুন।');
            });

            // ---------- SIDEBAR ICON MICRO ----------
            document.querySelectorAll('.sidebar-icon').forEach(icon => {
                icon.addEventListener('click', function() {
                    this.style.transform = 'scale(0.88)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                });
            });

            // ---------- SEARCH TOGGLE ----------
            searchToggleBtn.addEventListener('click', function() {
                internetSearchEnabled = !internetSearchEnabled;
                if (internetSearchEnabled) {
                    this.classList.add('active');
                    this.setAttribute('title', 'Internet Search: ON');
                } else {
                    this.classList.remove('active');
                    this.setAttribute('title', 'Internet Search: OFF');
                }
                db.ref('chatSettings/internetSearch').set(internetSearchEnabled);
                showToast(internetSearchEnabled ? '🌐 Internet Search Enabled' : '🌐 Internet Search Disabled');
            });

            // ---------- LOAD SETTINGS ----------
            function loadFirebaseSettings() {
                db.ref('chatSettings').once('value').then(snap => {
                    const data = snap.val() || {};
                    savedPrompts = data.prompts || defaultPrompts;
                    if (data.activeProvider) activeProvider = data.activeProvider;
                    internetSearchEnabled = data.internetSearch || false;
                    if (internetSearchEnabled) {
                        searchToggleBtn.classList.add('active');
                        searchToggleBtn.setAttribute('title', 'Internet Search: ON');
                    }
                    document.getElementById('prompt-write').value = savedPrompts.write || defaultPrompts.write;
                    document.getElementById('prompt-learn').value = savedPrompts.learn || defaultPrompts.learn;
                    document.getElementById('prompt-code').value = savedPrompts.code || defaultPrompts.code;
                    document.getElementById('prompt-life').value = savedPrompts.life || defaultPrompts.life;
                    const items = document.querySelectorAll('#apiDropdownMenu .model-dropdown-item');
                    items.forEach(item => {
                        const prov = item.getAttribute('data-provider');
                        if (prov === activeProvider) {
                            item.classList.add('active');
                            document.getElementById('apiSelectedLabel').textContent = item.querySelector(
                                '.item-label').textContent.trim();
                        } else item.classList.remove('active');
                    });
                }).catch(err => console.warn('Failed to load chat settings:', err));
                db.ref('multiAgentSettings').on('value', snap => {
                    const data = snap.val() || {};
                    multiAgentSettings.enabled = data.enabled !== undefined ? data.enabled : true;
                    multiAgentSettings.agents = data.agents || { groq: true, gemini: true, mistral: true,
                        cerebras: true, cloudflare: true };
                });
            }

            // ---------- SETTINGS MODAL ----------
            function openSettings() {
                document.getElementById('prompt-write').value = savedPrompts.write || defaultPrompts.write;
                document.getElementById('prompt-learn').value = savedPrompts.learn || defaultPrompts.learn;
                document.getElementById('prompt-code').value = savedPrompts.code || defaultPrompts.code;
                document.getElementById('prompt-life').value = savedPrompts.life || defaultPrompts.life;
                document.getElementById('settingsModal').classList.add('open');
            }

            function saveSettings() {
                savedPrompts = {
                    write: document.getElementById('prompt-write').value.trim(),
                    learn: document.getElementById('prompt-learn').value.trim(),
                    code: document.getElementById('prompt-code').value.trim(),
                    life: document.getElementById('prompt-life').value.trim()
                };
                const chatSettings = { prompts: savedPrompts, activeProvider: activeProvider,
                internetSearch: internetSearchEnabled };
                db.ref('chatSettings').set(chatSettings).then(() => {
                    showToast('💾 Settings saved to Firebase!');
                    document.getElementById('settingsModal').classList.remove('open');
                }).catch(err => { console.error('Save error:', err);
                    showToast('❌ Failed to save settings.'); });
            }

            document.getElementById('sidebarSettings').addEventListener('click', (e) => { e.stopPropagation();
                openSettings(); });
            document.getElementById('settingsCloseBtn').addEventListener('click', () => {
                document.getElementById('settingsModal').classList.remove('open');
            });
            document.getElementById('settingsModal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('open');
            });
            document.getElementById('settingsSaveBtn').addEventListener('click', saveSettings);

            // ---------- GLOBAL WINDOW FUNCTIONS ----------
            window.runErrorChecker = async function(id) {
                const container = document.getElementById(id);
                if (!container) return;
                const codeEl = container.querySelector('code');
                const langEl = container.querySelector('.code-block-lang');
                const lang = langEl ? langEl.textContent : 'javascript';
                if (!codeEl) return;
                const rawCode = codeEl.textContent;
                let loader = container.querySelector('.code-block-loader');
                if (!loader) {
                    loader = document.createElement('div');
                    loader.className = 'code-block-loader';
                    loader.innerHTML = `
                        <div style="display:flex; flex-direction:column; align-items:center; gap:12px; color:#fff;">
                            <i class="fa-solid fa-spinner fa-spin" style="font-size:32px; color:var(--accent);"></i>
                            <span style="font-size:12px; font-weight:700; letter-spacing:0.5px;">🔍 AI ERROR CHECKER ACTIVE...</span>
                        </div>`;
                    container.appendChild(loader);
                }
                loader.style.display = 'flex';
                const provider = activeProvider;
                const model = getDefaultModelForAPI(activeProvider);
                const queryInstruction =
                    `You are a debug system. Fix syntax errors, bugs, loops. Output ONLY corrected code. No markdown.`;
                const controller = new AbortController();
                activeControllers.push(controller);
                try {
                    const resText = await callAPI(provider, model, `${queryInstruction}\n\nCode:\n${rawCode}`, controller
                        .signal);
                    let cleaned = resText.trim();
                    if (cleaned.startsWith('```')) {
                        const lines = cleaned.split('\n');
                        if (lines[0].startsWith('```')) lines.shift();
                        if (lines[lines.length - 1] === '```') lines.pop();
                        cleaned = lines.join('\n');
                    }
                    codeEl.textContent = cleaned;
                    codeEl.innerHTML = highlightCode(cleaned, lang);
                    showToast('🚀 Patches successfully completed!');
                } catch (err) {
                    showToast(`❌ Debugger Error: ${err.message}`);
                } finally {
                    loader.style.display = 'none';
                    const idx = activeControllers.indexOf(controller);
                    if (idx !== -1) activeControllers.splice(idx, 1);
                }
            };

            window.copyCodeBlock = function(id) {
                const container = document.getElementById(id);
                if (!container) return;
                const codeEl = container.querySelector('code');
                if (!codeEl) return;
                navigator.clipboard.writeText(codeEl.textContent).then(() => {
                    showToast('📋 Code copied!');
                }).catch(() => {
                    const temp = document.createElement('textarea');
                    temp.value = codeEl.textContent;
                    document.body.appendChild(temp);
                    temp.select();
                    document.execCommand('copy');
                    document.body.removeChild(temp);
                    showToast('📋 Code copied!');
                });
            };

            window.downloadCodeBlock = function(id, lang) {
                const container = document.getElementById(id);
                if (!container) return;
                const codeEl = container.querySelector('code');
                if (!codeEl) return;
                const codeText = codeEl.textContent;
                const extMap = { 'js': 'js', 'javascript': 'js', 'html': 'html', 'py': 'py', 'python': 'py',
                    'css': 'css', 'json': 'json' };
                const ext = extMap[lang] || 'txt';
                const blob = new Blob([codeText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `code.${ext}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast(`💾 Downloaded as code.${ext}`);
            };

            window.clearMonitorOutput = function(id) {
                const container = document.getElementById(id);
                if (!container) return;
                const screen = container.querySelector('.pc-monitor-screen');
                if (screen) screen.innerHTML = '<span style="color:#666;font-style:italic;">Console cleared.</span>';
            };

            window.runCodeBlock = function(id, lang) {
                const container = document.getElementById(id);
                if (!container) return;
                const codeEl = container.querySelector('code');
                const screen = container.querySelector('.pc-monitor-screen');
                if (!codeEl || !screen) return;
                const codeText = codeEl.textContent;
                lang = (lang || 'plaintext').toLowerCase();
                screen.innerHTML = '';
                try {
                    if (lang === 'js' || lang === 'javascript') {
                        const iframe = document.createElement('iframe');
                        iframe.style.width = '100%';
                        iframe.style.height = '100%';
                        iframe.style.border = 'none';
                        iframe.style.background = '#040406';
                        screen.appendChild(iframe);
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        doc.open();
                        doc.write(`
                            <html><head><style>body{background:#040406;color:#e3e6ed;font-family:monospace;padding:14px;margin:0;}</style></head>
                            <body><div id="output"></div>
                            <script>
                                (function(){
                                    const output=document.getElementById('output');
                                    const origLog=console.log;
                                    console.log=function(...args){
                                        const str=args.map(a=>typeof a==='object'?JSON.stringify(a):a).join(' ');
                                        output.innerHTML+='<div>&gt; '+str+'</div>';
                                    };
                                    try{
                                        const result=eval(\`${codeText.replace(/`/g,'\\`')}\`);
                                        if(result!==undefined) output.innerHTML+='<div style="color:#00ffff;margin-top:10px;"><strong>Returned:</strong> '+result+'</div>';
                                    }catch(e){ output.innerHTML+='<div style="color:#ef4444;">Error: '+e.message+'</div>'; }
                                    console.log=origLog;
                                })();
                            <\/script></body></html>
                        `);
                        doc.close();
                    } else if (lang === 'html') {
                        const iframe = document.createElement('iframe');
                        iframe.style.width = '100%';
                        iframe.style.height = '100%';
                        iframe.style.border = 'none';
                        iframe.style.background = '#ffffff';
                        screen.appendChild(iframe);
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        doc.open();
                        doc.write(codeText);
                        doc.close();
                    } else if (lang === 'css') {
                        screen.innerHTML = `
                            <div style="color:#B084FF;font-weight:bold;margin-bottom:6px;">CSS Loaded:</div>
                            <style>${codeText}</style>
                            <div class="css-demo" style="padding:15px;border-radius:8px;border:1px solid #444;text-align:center;background:#111;">Styled CSS Sandbox</div>`;
                    } else if (lang === 'py' || lang === 'python') {
                        const lines = codeText.split('\n');
                        let outputHTML =
                            `<div style="color:#ff9933;margin-bottom:8px;"><i class="fa-brands fa-python"></i> Python 3 output:</div>`;
                        let hasOutput = false;
                        lines.forEach(line => {
                            const trimmed = line.trim();
                            if (trimmed.startsWith('print(')) {
                                const match = trimmed.match(/print\((.*)\)/);
                                if (match && match[1]) {
                                    hasOutput = true;
                                    let raw = match[1].trim();
                                    if ((raw.startsWith('"') && raw.endsWith('"')) || (raw.startsWith("'") && raw
                                        .endsWith("'"))) raw = raw.slice(1, -1);
                                    outputHTML += `<div style="color:#fff;margin-bottom:4px;">${escapeHtml(raw)}</div>`;
                                }
                            }
                        });
                        if (!hasOutput) outputHTML +=
                            `<div style="color:#777;font-style:italic;">Script executed (no logs).</div>`;
                        screen.innerHTML = outputHTML;
                    } else {
                        screen.innerHTML = `<span style="color:#52E552;">Compiled & Virtualized successfully.</span>`;
                    }
                } catch (err) {
                    screen.innerHTML = `<span style="color:#e63946;"><strong>Runtime Error:</strong> ${err.message}</span>`;
                }
            };

            window.switchCodeBlockTab = function(blockId, tab) {
                const container = document.getElementById(blockId);
                if (!container) return;
                const codeBody = container.querySelector('.code-block-body');
                const monitorFrame = container.querySelector('.pc-monitor-wrapper');
                const tabs = container.querySelectorAll('.code-block-tabs .tab-btn');
                tabs.forEach(btn => {
                    const btnTab = btn.getAttribute('data-tab');
                    btn.classList.toggle('active', btnTab === tab);
                });
                if (tab === 'code') {
                    codeBody.style.display = 'block';
                    monitorFrame.style.display = 'none';
                } else {
                    codeBody.style.display = 'none';
                    monitorFrame.style.display = 'block';
                    const screen = container.querySelector('.pc-monitor-screen');
                    if (!screen.hasChildNodes() || screen.innerHTML.trim() === '') {
                        window.runCodeBlock(blockId, container.querySelector('.code-block-lang').textContent);
                    }
                }
            };

            // ---------- INIT ----------
            window.addEventListener('DOMContentLoaded', function() {
                buildThemeMenu();
                setTheme(currentIndex);
                loadFirebaseSettings();
                showToast('🚀 MOTOTUS with 10 premium themes & full logic ready!');
            });

            console.log('✅ chat.html fully functional with 10 themes and fixed Serper/Tavily search.');
        })();
    </script>
</body>
</html>
