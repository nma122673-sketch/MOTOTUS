    <!-- ============================================================
    JAVASCRIPT (fixed race condition, inline styles, etc.)
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ---------- THEME SYSTEM ----------
            const themes = ['light', 'dark', 'blue'];
            const themeNames = ['Light', 'Dark', 'Blue'];
            const themeIcons = ['fa-sun', 'fa-moon', 'fa-gem'];
            const root = document.documentElement;

            let currentIndex = themes.indexOf(localStorage.getItem('mototus-theme'));
            if (currentIndex === -1) currentIndex = 0;

            function setTheme(index) {
                const theme = themes[index];
                root.setAttribute('data-theme', theme);
                localStorage.setItem('mototus-theme', theme);
                currentIndex = index;

                const iconEl = document.getElementById('sidebarThemeIcon');
                if (iconEl) {
                    iconEl.className = 'theme-icon';
                    iconEl.classList.add('fa-regular', themeIcons[index]);
                }

                const items = document.querySelectorAll('.sidebar-theme-item');
                items.forEach((item, i) => {
                    item.classList.toggle('active', i === index);
                });
            }

            setTheme(currentIndex);

            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.shiftKey && (e.key === 'y' || e.key === 'Y')) {
                    e.preventDefault();
                    const nextIndex = (currentIndex + 1) % themes.length;
                    setTheme(nextIndex);
                    showToast('🎯 Theme: ' + themeNames[nextIndex]);
                }
            });

            // ---------- SIDEBAR THEME DROPDOWN ----------
            const themeTrigger = document.getElementById('sidebarThemeTrigger');
            const themeMenu = document.getElementById('sidebarThemeMenu');
            const themeItems = themeMenu.querySelectorAll('.sidebar-theme-item');

            themeTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                themeMenu.classList.toggle('open');
                if (themeMenu.classList.contains('open')) {
                    themeTrigger.style.transform = 'scale(0.92)';
                    setTimeout(() => { themeTrigger.style.transform = ''; }, 150);
                }
            });

            themeItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const themeValue = this.getAttribute('data-theme-value');
                    const index = themes.indexOf(themeValue);
                    if (index !== -1 && index !== currentIndex) {
                        setTheme(index);
                        showToast('🎨 Theme: ' + themeNames[index]);
                    }
                    themeMenu.classList.remove('open');
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                });
            });

            document.addEventListener('click', function(e) {
                const wrapper = document.getElementById('sidebarThemeWrapper');
                if (!wrapper.contains(e.target)) {
                    themeMenu.classList.remove('open');
                }
            });

            // ---------- TOAST ----------
            function showToast(msg) {
                const old = document.querySelector('.mototus-toast');
                if (old) old.remove();

                const toast = document.createElement('div');
                toast.className = 'mototus-toast';
                toast.textContent = msg;
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });

                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, 2500);
            }

            // ---------- CHAT UI ----------
            const userInput = document.getElementById('userInput');
            const chatMessages = document.getElementById('chatMessages');
            const sendBtn = document.getElementById('sendBtn');

            const responses = [
                "That's a great question! Let me think about it.",
                "I understand. Here's what I can tell you about that.",
                "Interesting point! Let me break it down for you.",
                "I see what you mean. Let me provide some insights.",
                "Thanks for asking! Here's my take on this.",
                "Sure thing! I'll do my best to help.",
                "Let me analyze that for you.",
                "Good one! Here's a detailed explanation."
            ];

            function getAIResponse(input) {
                if (input.length < 3) return "Could you elaborate a bit more?";
                if (input.includes('?')) return "That's a thoughtful question. " + responses[Math.floor(Math.random() * responses
                    .length)];
                return responses[Math.floor(Math.random() * responses.length)] + " (based on your input: \"" + input + "\")";
            }

            // Create a message element
            function createMessage(text, type) {
                const wrapper = document.createElement('div');
                wrapper.className = 'chat-message ' + type;

                if (type === 'user') {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.textContent = text;
                    wrapper.appendChild(bubble);
                } else {
                    // AI message: avatar (red brain, no background) + bubble
                    const avatar = document.createElement('div');
                    avatar.className = 'avatar';
                    avatar.innerHTML = `
                        <div class="mini-orbit">
                            <div class="half left"><i class="fas fa-brain"></i></div>
                            <div class="half right"><i class="fas fa-brain"></i></div>
                            <div class="line"></div>
                        </div>
                    `;
                    wrapper.appendChild(avatar);

                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.textContent = text;
                    wrapper.appendChild(bubble);
                }
                return wrapper;
            }

            // ---- FIXED: added isTyping flag to prevent race condition ----
            let isTyping = false;

            // Typewriter effect inside an AI bubble
            function typeWriterAI(text, messageElement) {
                const bubble = messageElement.querySelector('.bubble');
                bubble.innerHTML = '';
                let index = 0;
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'cursor-blink';
                bubble.appendChild(cursorSpan);

                function typeChar() {
                    if (index < text.length) {
                        const char = text.charAt(index);
                        const textNode = document.createTextNode(char);
                        bubble.insertBefore(textNode, cursorSpan);
                        index++;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        setTimeout(typeChar, 25 + Math.random() * 30);
                    } else {
                        if (cursorSpan.parentNode) cursorSpan.remove();
                        messageElement.classList.remove('typing');
                        // typing finished
                        isTyping = false;
                    }
                }
                isTyping = true;
                typeChar();
            }

            function handleSend() {
                // Prevent sending while AI is typing
                if (isTyping) {
                    showToast('⏳ Please wait for the current response to finish.');
                    return;
                }

                const inputText = userInput.value.trim();
                if (!inputText) {
                    showToast('Please type something first.');
                    return;
                }

                // Append User Message
                const userMsg = createMessage(inputText, 'user');
                chatMessages.appendChild(userMsg);
                userInput.value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Show "Thinking..." placeholder for AI with typing animation
                const aiMsg = createMessage('Thinking...', 'ai');
                aiMsg.classList.add('typing'); // Avatar flips
                chatMessages.appendChild(aiMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Simulate AI response
                setTimeout(() => {
                    const response = getAIResponse(inputText);
                    typeWriterAI(response, aiMsg);
                }, 400 + Math.random() * 400);
            }

            // Event listeners
            sendBtn.addEventListener('click', handleSend);

            userInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // New Chat Trigger relocated to Sidebar Plus Icon
            const sidebarNewChatBtn = document.getElementById('sidebarNewChatBtn');
            if (sidebarNewChatBtn) {
                sidebarNewChatBtn.addEventListener('click', function() {
                    chatMessages.innerHTML = '';
                    userInput.value = '';
                    isTyping = false; // reset in case typing was ongoing
                    showToast('✨ New conversation started');
                    userInput.focus();
                    this.style.transform = 'scale(0.88) rotate(90deg)';
                    setTimeout(() => { this.style.transform = ''; }, 300);
                });
            }

            // ---------- DOCUMENT TRANSFER SYSTEM ----------
            const docUploadBtn = document.getElementById('docUploadBtn');
            const docFileInput = document.getElementById('docFileInput');

            if (docUploadBtn && docFileInput) {
                docUploadBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    docFileInput.click();
                });

                docFileInput.addEventListener('change', function() {
                    if (docFileInput.files.length === 0) return;
                    const file = docFileInput.files[0];
                    showToast('📁 Loading document: ' + file.name);

                    // If API is active, dispatch to the second custom auto-detection engine
                    const rawConfig = localStorage.getItem('mototus-smart-api-config');
                    let hasApi = false;
                    if (rawConfig) {
                        try {
                            const c = JSON.parse(rawConfig);
                            if (c && c.apiKey) hasApi = true;
                        } catch(e){}
                    }

                    if (hasApi) {
                        const event = new CustomEvent('mototus-doc-uploaded', { detail: file });
                        window.dispatchEvent(event);
                    } else {
                        // Local simulated fallback behavior
                        if (isTyping) {
                            showToast('⏳ Please wait for the current response to finish.');
                            return;
                        }

                        const docText = `📁 Uploaded document: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                        const userMsg = createMessage(docText, 'user');
                        chatMessages.appendChild(userMsg);
                        chatMessages.scrollTop = chatMessages.scrollHeight;

                        const aiMsg = createMessage('Thinking...', 'ai');
                        aiMsg.classList.add('typing');
                        chatMessages.appendChild(aiMsg);
                        chatMessages.scrollTop = chatMessages.scrollHeight;

                        setTimeout(() => {
                            const response = `I have successfully received and processed your document: "${file.name}". What parameters or fields would you like me to examine?`;
                            typeWriterAI(response, aiMsg);
                        }, 800 + Math.random() * 400);
                    }
                    docFileInput.value = ''; // Reset input to allow re-uploads
                });
            }

            // ---------- MODEL DROPDOWN ----------
            const modelTrigger = document.getElementById('modelDropdownTrigger');
            const modelMenu = document.getElementById('modelDropdownMenu');
            const modelItems = modelMenu.querySelectorAll('.model-dropdown-item');
            const modelSelectedLabel = document.getElementById('modelSelectedLabel');

            modelTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                modelMenu.classList.toggle('open');
                modelTrigger.classList.toggle('open');
                if (modelMenu.classList.contains('open')) {
                    modelTrigger.style.transform = 'scale(0.96)';
                    setTimeout(() => { modelTrigger.style.transform = ''; }, 150);
                }
            });

            modelItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const label = this.querySelector('.item-label').textContent.trim();
                    modelSelectedLabel.textContent = label;
                    modelItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    modelMenu.classList.remove('open');
                    modelTrigger.classList.remove('open');
                    showToast('🧠 Model: ' + label);
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                });
            });

            document.addEventListener('click', function(e) {
                const dd = document.getElementById('modelDropdown');
                if (!dd.contains(e.target)) {
                    modelMenu.classList.remove('open');
                    modelTrigger.classList.remove('open');
                }
            });

            // ---------- QUALITY DROPDOWN ----------
            const trigger = document.getElementById('dropdownTrigger');
            const menu = document.getElementById('dropdownMenu');
            const selectedLabel = document.getElementById('selectedLabel');
            const items = menu.querySelectorAll('.premium-dropdown-item');

            trigger.addEventListener('click', function(e) {
                e.stopPropagation();
                menu.classList.toggle('open');
                trigger.classList.toggle('open');
                if (menu.classList.contains('open')) {
                    trigger.style.transform = 'scale(0.96)';
                    setTimeout(() => { trigger.style.transform = ''; }, 150);
                }
            });

            items.forEach(item => {
                item.addEventListener('click', function(e) {
                    const value = this.getAttribute('data-value');
                    if (value === 'Complex') return;

                    e.stopPropagation();
                    const label = this.querySelector('.item-label').textContent.trim();
                    selectedLabel.textContent = label;
                    items.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    menu.classList.remove('open');
                    trigger.classList.remove('open');

                    const isPremium = (value === 'Max' || value === 'High');
                    const iconEmoji = isPremium ? '✨' : '⚡';
                    const labelEmoji = isPremium ? 'Premium' : 'Standard';
                    showToast(iconEmoji + ' ' + labelEmoji + ' mode: ' + value);
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                });
            });

            document.addEventListener('click', function(e) {
                const dd = document.getElementById('premiumDropdown');
                if (!dd.contains(e.target)) {
                    menu.classList.remove('open');
                    trigger.classList.remove('open');
                }
            });

            // ---------- COMPLEX TOGGLE (fixed: use class instead of inline styles) ----------
            const complexCheckbox = document.getElementById('complexCheckbox');
            const complexParent = complexCheckbox.closest('.premium-dropdown-item');

            complexCheckbox.addEventListener('change', function(e) {
                e.stopPropagation();
                const isChecked = this.checked;
                showToast(isChecked ? '🧠 Complex Thinking: ON' : '🧠 Complex Thinking: OFF');
                // Use class instead of inline styles
                complexParent.classList.toggle('complex-active', isChecked);
            });

            // ---------- CHIPS ----------
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', function() {
                    chips.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    const label = this.querySelector('.chip-label').textContent;
                    const icons = ['✍️', '📚', '💻', '👑'];
                    const idx = Array.from(chips).indexOf(this);
                    showToast('✨ ' + icons[idx] + ' ' + label + ' mode activated');
                    this.style.transform = 'scale(0.92)';
                    setTimeout(() => { this.style.transform = ''; }, 200);
                });
            });

            // ---------- SIDEBAR ICONS ----------
            document.querySelectorAll('.sidebar-icon').forEach(icon => {
                icon.addEventListener('click', function() {
                    this.style.transform = 'scale(0.88)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                });
            });

            // ---------- MIC & HELP ----------
            document.querySelector('.toolbar-mic').addEventListener('click', function() {
                showToast('🎤 Voice input coming soon!');
            });
            document.querySelector('.help-icon').addEventListener('click', function() {
                showToast('💡 Type your question and press Enter or click Send.');
            });

            userInput.focus();
            console.log('✅ MOTOTUS — All bugs fixed (chip vars, z‑index, padding, race condition, inline styles, avatar colors, toast)');

        })();
    </script>

    <!-- MOTOTUS SMART API CONFIGURATION MODAL -->
    <div id="mototusApiModal" class="mototus-api-modal">
        <div class="mototus-api-card">
            <div class="mototus-api-header">
                <h3><i class="fa-solid fa-gears"></i> API Configuration</h3>
                <span id="closeMototusApiModal" class="mototus-api-close"><i class="fa-solid fa-xmark"></i></span>
            </div>
            <div class="mototus-api-body">
                <div class="mototus-api-field">
                    <label for="mototusApiKey">API Key</label>
                    <div class="mototus-api-input-wrap">
                        <input type="password" id="mototusApiKey" class="mototus-api-input" placeholder="Enter API Key">
                        <button type="button" id="mototusApiKeyToggle" class="mototus-api-vis-toggle" title="Toggle visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mototus-api-field">
                    <label for="mototusApiModel">Model Name</label>
                    <input type="text" id="mototusApiModel" class="mototus-api-input" placeholder="e.g., gpt-4o-mini, llama3.1-8b">
                </div>
                <div class="mototus-api-actions">
                    <button type="button" id="deleteMototusApi" class="mototus-api-btn mototus-api-btn-danger">Delete Key</button>
                    <button type="button" id="testMototusApi" class="mototus-api-btn mototus-api-btn-secondary">Test Connection</button>
                    <button type="button" id="saveMototusApi" class="mototus-api-btn mototus-api-btn-primary">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MOTOTUS SMART AUTO-DETECTION ENGINE -->
    <script>
        (function() {
            'use strict';

            const apiModal = document.getElementById('mototusApiModal');
            const openModalBtn = document.querySelector('.sidebar-icon.settings-icon');
            const closeModalBtn = document.getElementById('closeMototusApiModal');
            
            const apiKeyInput = document.getElementById('mototusApiKey');
            const apiModelInput = document.getElementById('mototusApiModel');
            const apiKeyToggle = document.getElementById('mototusApiKeyToggle');
            
            const btnSave = document.getElementById('saveMototusApi');
            const btnTest = document.getElementById('testMototusApi');
            const btnDelete = document.getElementById('deleteMototusApi');
            
            const chatMessages = document.getElementById('chatMessages');
            const originalUserInput = document.getElementById('userInput');
            const originalSendBtn = document.getElementById('sendBtn');
            const originalNewChatBtn = document.getElementById('sidebarNewChatBtn'); // updated to sidebar plus

            let isApiTyping = false;
            let customHistory = [];

            const CONFIG_KEY = 'mototus-smart-api-config';

            // Popular working default models to use during fallbacks
            const providerDefaults = {
                'OpenAI': { model: 'gpt-4o-mini', baseUrl: 'https://api.openai.com/v1' },
                'Cerebras': { model: 'llama3.1-8b', baseUrl: 'https://api.cerebras.ai/v1' },
                'Groq': { model: 'llama-3.1-8b-instant', baseUrl: 'https://api.groq.com/openai/v1' },
                'Mistral': { model: 'open-mistral-7b', baseUrl: 'https://api.mistral.ai/v1' },
                'Together AI': { model: 'meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo', baseUrl: 'https://api.together.xyz/v1' },
                'OpenRouter': { model: 'meta-llama/llama-3-8b-instruct:free', baseUrl: 'https://openrouter.ai/api/v1' },
                'Gemini': { model: 'gemini-1.5-flash', baseUrl: 'https://generativelanguage.googleapis.com/v1beta/openai' },
                'Cloudflare': { model: '@cf/meta/llama-3.1-8b-instruct', baseUrl: null }
            };

            function showApiToast(msg) {
                const old = document.querySelector('.mototus-toast');
                if (old) old.remove();

                const toast = document.createElement('div');
                toast.className = 'mototus-toast';
                toast.textContent = msg;
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });

                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, 2800);
            }

            function loadConfig() {
                const raw = localStorage.getItem(CONFIG_KEY);
                if (raw) {
                    try {
                        const config = JSON.parse(raw);
                        apiKeyInput.value = config.apiKey || '';
                        apiModelInput.value = config.model || '';
                    } catch (e) {
                        console.error(e);
                    }
                } else {
                    apiKeyInput.value = '';
                    apiModelInput.value = '';
                }
            }

            // Automatic Provider Detection and Verification Engine
            async function runDetectionEngine(apiKey, modelName) {
                const endpoints = [
                    { name: 'OpenAI', url: 'https://api.openai.com/v1' },
                    { name: 'Cerebras', url: 'https://api.cerebras.ai/v1' },
                    { name: 'Groq', url: 'https://api.groq.com/openai/v1' },
                    { name: 'Mistral', url: 'https://api.mistral.ai/v1' },
                    { name: 'Together AI', url: 'https://api.together.xyz/v1' },
                    { name: 'OpenRouter', url: 'https://openrouter.ai/api/v1' },
                    { name: 'Gemini', url: 'https://generativelanguage.googleapis.com/v1beta/openai' }
                ];

                // 1. Analyze Key Signatures for Instant Mapping
                let reordered = [...endpoints];
                if (apiKey.startsWith('csk-')) {
                    reordered = [{ name: 'Cerebras', url: 'https://api.cerebras.ai/v1' }, ...endpoints.filter(e => e.name !== 'Cerebras')];
                } else if (apiKey.startsWith('gsk_')) {
                    reordered = [{ name: 'Groq', url: 'https://api.groq.com/openai/v1' }, ...endpoints.filter(e => e.name !== 'Groq')];
                } else if (apiKey.startsWith('sk-or-')) {
                    reordered = [{ name: 'OpenRouter', url: 'https://openrouter.ai/api/v1' }, ...endpoints.filter(e => e.name !== 'OpenRouter')];
                } else if (apiKey.startsWith('AIzaSy')) {
                    reordered = [{ name: 'Gemini', url: 'https://generativelanguage.googleapis.com/v1beta/openai' }, ...endpoints.filter(e => e.name !== 'Gemini')];
                } else if (apiKey.startsWith('sk-proj-')) {
                    reordered = [{ name: 'OpenAI', url: 'https://api.openai.com/v1' }, ...endpoints.filter(e => e.name !== 'OpenAI')];
                }

                // 2. Cloudflare API Account Auto-Discovery via Bearer Token
                if (apiKey.length === 40 && !apiKey.startsWith('sk-')) {
                    try {
                        const cfRes = await fetch('https://api.cloudflare.com/client/v4/accounts', {
                            headers: { 'Authorization': `Bearer ${apiKey}` }
                        });
                        if (cfRes.ok) {
                            const cfData = await cfRes.json();
                            if (cfData.success && cfData.result && cfData.result.length > 0) {
                                const accountId = cfData.result[0].id;
                                const cfUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/ai/v1`;
                                reordered.unshift({ name: 'Cloudflare', url: cfUrl });
                            }
                        }
                    } catch (e) {
                        // Fail silently, fall back to other providers
                    }
                }

                // 3. Parallel probing on detected and backup endpoints
                const probePromises = reordered.map(async (ep) => {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); // 6s per request limit

                    try {
                        const testUrl = `${ep.url}/chat/completions`;
                        const testModel = modelName || providerDefaults[ep.name].model;
                        const response = await fetch(testUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: testModel,
                                messages: [{ role: 'user', content: 'Ping' }],
                                max_tokens: 1
                            }),
                            signal: controller.signal
                        });

                        clearTimeout(timeoutId);

                        if (response.status === 200) {
                            return { status: 'success', endpoint: ep.url, provider: ep.name, model: testModel };
                        } else if (response.status === 400 || response.status === 404 || response.status === 422) {
                            // Endpoint works but model name was unrecognized / unavailable
                            return { status: 'bad_model', endpoint: ep.url, provider: ep.name };
                        } else {
                            throw new Error('Connection failed');
                        }
                    } catch (err) {
                        clearTimeout(timeoutId);
                        throw err;
                    }
                });

                const results = await Promise.allSettled(probePromises);

                // Check for verified successful endpoint and model pairing
                for (const res of results) {
                    if (res.status === 'fulfilled' && res.value.status === 'success') {
                        return res.value;
                    }
                }

                // Smart Fallback/Correction: If base URL matched but model is invalid, auto-fix
                for (const res of results) {
                    if (res.status === 'fulfilled' && res.value.status === 'bad_model') {
                        const fallbackModel = providerDefaults[res.value.provider].model;
                        return {
                            status: 'success',
                            endpoint: res.value.endpoint,
                            provider: res.value.provider,
                            model: fallbackModel,
                            autoFixed: true,
                            warning: `Model unverified. Configured default model: ${fallbackModel}`
                        };
                    }
                }

                throw new Error('No working provider detected. Verify your API Key.');
            }

            // Modal Interactions
            openModalBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                loadConfig();
                apiModal.classList.add('open');
            });

            closeModalBtn.addEventListener('click', function() {
                apiModal.classList.remove('open');
            });

            window.addEventListener('click', function(e) {
                if (e.target === apiModal) {
                    apiModal.classList.remove('open');
                }
            });

            apiKeyToggle.addEventListener('click', function() {
                const isPassword = apiKeyInput.type === 'password';
                apiKeyInput.type = isPassword ? 'text' : 'password';
                this.querySelector('i').className = isPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
            });

            // Action Buttons Handling
            btnSave.addEventListener('click', async function() {
                const key = apiKeyInput.value.trim();
                const model = apiModelInput.value.trim();

                if (!key) {
                    showApiToast('⚠️ Please enter an API key.');
                    return;
                }

                btnSave.textContent = 'Detecting...';
                btnSave.disabled = true;

                try {
                    const config = await runDetectionEngine(key, model);
                    const finalConfig = {
                        apiKey: key,
                        model: config.model,
                        baseUrl: config.endpoint,
                        provider: config.provider
                    };
                    localStorage.setItem(CONFIG_KEY, JSON.stringify(finalConfig));
                    apiModelInput.value = config.model;

                    if (config.autoFixed) {
                        showApiToast('💡 ' + config.warning);
                    } else {
                        showApiToast('✅ Auto-detected ' + config.provider + '! Configuration saved.');
                    }
                    apiModal.classList.remove('open');
                } catch (err) {
                    showApiToast('❌ Probe failed: ' + err.message);
                } finally {
                    btnSave.textContent = 'Save Settings';
                    btnSave.disabled = false;
                }
            });

            btnTest.addEventListener('click', async function() {
                const key = apiKeyInput.value.trim();
                const model = apiModelInput.value.trim();

                if (!key) {
                    showApiToast('⚠️ Please enter an API key to test.');
                    return;
                }

                btnTest.textContent = 'Probing...';
                btnTest.disabled = true;

                try {
                    const config = await runDetectionEngine(key, model);
                    showApiToast('✅ Verified ' + config.provider + ' connection with model ' + config.model + '!');
                } catch (err) {
                    showApiToast('❌ Connection failed: ' + err.message);
                } finally {
                    btnTest.textContent = 'Test Connection';
                    btnTest.disabled = false;
                }
            });

            btnDelete.addEventListener('click', function() {
                if (confirm('Delete configuration? Custom API configurations will be cleared.')) {
                    localStorage.removeItem(CONFIG_KEY);
                    apiKeyInput.value = '';
                    apiModelInput.value = '';
                    showApiToast('🗑️ Settings cleared. Fallback simulation enabled.');
                }
            });

            // Retrieval Helper
            function getSavedConfig() {
                const raw = localStorage.getItem(CONFIG_KEY);
                if (raw) {
                    try { return JSON.parse(raw); } catch (e) { return null; }
                }
                return null;
            }

            // Custom UI elements (identical avatar styles as original)
            function createCustomMessage(text, type) {
                const wrapper = document.createElement('div');
                wrapper.className = 'chat-message ' + type;

                if (type === 'user') {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.textContent = text;
                    wrapper.appendChild(bubble);
                } else {
                    const avatar = document.createElement('div');
                    avatar.className = 'avatar';
                    avatar.innerHTML = `
                        <div class="mini-orbit">
                            <div class="half left"><i class="fas fa-brain"></i></div>
                            <div class="half right"><i class="fas fa-brain"></i></div>
                            <div class="line"></div>
                        </div>
                    `;
                    wrapper.appendChild(avatar);

                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.textContent = text;
                    wrapper.appendChild(bubble);
                }
                return wrapper;
            }

            function typeWriterCustomAI(text, messageElement) {
                const bubble = messageElement.querySelector('.bubble');
                bubble.innerHTML = '';
                let index = 0;
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'cursor-blink';
                bubble.appendChild(cursorSpan);

                function typeChar() {
                    if (index < text.length) {
                        const char = text.charAt(index);
                        const textNode = document.createTextNode(char);
                        bubble.insertBefore(textNode, cursorSpan);
                        index++;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        setTimeout(typeChar, 25 + Math.random() * 30);
                    } else {
                        if (cursorSpan.parentNode) cursorSpan.remove();
                        messageElement.classList.remove('typing');
                        isApiTyping = false;
                    }
                }
                isApiTyping = true;
                typeChar();
            }

            // Intercept message dispatch
            async function handleCustomSend() {
                if (isApiTyping) {
                    showApiToast('⏳ Please wait for the current response to finish.');
                    return;
                }

                const inputText = originalUserInput.value.trim();
                if (!inputText) {
                    showApiToast('Please type something first.');
                    return;
                }

                const config = getSavedConfig();
                if (!config || !config.apiKey) return; // Propagates normally when key is absent

                const userMsg = createCustomMessage(inputText, 'user');
                chatMessages.appendChild(userMsg);
                originalUserInput.value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;

                customHistory.push({ role: 'user', content: inputText });

                const aiMsg = createCustomMessage('Thinking...', 'ai');
                aiMsg.classList.add('typing');
                chatMessages.appendChild(aiMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                isApiTyping = true;

                const url = `${config.baseUrl}/chat/completions`;
                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.apiKey}`
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            model: config.model,
                            messages: customHistory
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        const errMsg = errData?.error?.message || errData?.message || ('HTTP ' + response.status);
                        throw new Error(errMsg);
                    }

                    const resData = await response.json();
                    const aiReplyText = resData?.choices?.[0]?.message?.content || 'Empty reply content received.';

                    customHistory.push({ role: 'assistant', content: aiReplyText });
                    typeWriterCustomAI(aiReplyText, aiMsg);

                } catch (err) {
                    console.error(err);
                    aiMsg.classList.remove('typing');
                    const bubble = aiMsg.querySelector('.bubble');
                    bubble.textContent = `Error: ${err.message || 'Failed to complete API request.'}`;
                    isApiTyping = false;
                }
            }

            // Event captures
            originalSendBtn.addEventListener('click', function(e) {
                const config = getSavedConfig();
                if (config && config.apiKey) {
                    e.stopImmediatePropagation();
                    handleCustomSend();
                }
            }, true);

            originalUserInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    const config = getSavedConfig();
                    if (config && config.apiKey) {
                        e.preventDefault();
                        e.stopImmediatePropagation();
                        handleCustomSend();
                    }
                }
            }, true);

            originalNewChatBtn.addEventListener('click', function() {
                customHistory = [];
                isApiTyping = false;
            });

            // Handle custom API Document Upload events
            window.addEventListener('mototus-doc-uploaded', async function(e) {
                const file = e.detail;
                if (isApiTyping) {
                    showApiToast('⏳ Please wait for the current response to finish.');
                    return;
                }

                const config = getSavedConfig();
                if (!config || !config.apiKey) return;

                const docText = `📁 Uploaded document: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                const userMsg = createCustomMessage(docText, 'user');
                chatMessages.appendChild(userMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                customHistory.push({ role: 'user', content: `[User uploaded document: ${file.name}]` });

                const aiMsg = createCustomMessage('Thinking...', 'ai');
                aiMsg.classList.add('typing');
                chatMessages.appendChild(aiMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                isApiTyping = true;

                const url = `${config.baseUrl}/chat/completions`;
                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.apiKey}`
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            model: config.model,
                            messages: customHistory
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        const errMsg = errData?.error?.message || errData?.message || ('HTTP ' + response.status);
                        throw new Error(errMsg);
                    }

                    const resData = await response.json();
                    const aiReplyText = resData?.choices?.[0]?.message?.content || 'Empty reply content received.';

                    customHistory.push({ role: 'assistant', content: aiReplyText });
                    typeWriterCustomAI(aiReplyText, aiMsg);

                } catch (err) {
                    console.error(err);
                    aiMsg.classList.remove('typing');
                    const bubble = aiMsg.querySelector('.bubble');
                    bubble.textContent = `Error analyzing document: ${err.message || 'API request failed.'}`;
                    isApiTyping = false;
                }
            });
        })();
    </script>
